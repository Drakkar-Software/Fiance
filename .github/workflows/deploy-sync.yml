name: Deploy Sync Server

on:
  push:
    branches: [main, master]
    paths:
      - "apps/server/**"
      - "patches/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Starfish Sync Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # Run from repo root so pnpm patches (patchedDependencies) are applied.
        # --frozen-lockfile ensures the lockfile's patch_hash is honoured.
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: apps/server
          command: deploy
