name: Deploy Web

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --config.node-linker=hoisted --no-frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build web
        run: pnpm build:web
        env:
          EXPO_PUBLIC_SYNC_URL: ${{ vars.EXPO_PUBLIC_SYNC_URL }}

      - name: Create 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Relocate WASM out of node_modules path
        run: |
          WASM_FILE=$(find dist/assets/node_modules -name "*.wasm" -type f | head -1)
          if [ -n "$WASM_FILE" ]; then
            WASM_NAME=$(basename "$WASM_FILE")
            WASM_OLD_PATH="${WASM_FILE#dist/}"
            cp "$WASM_FILE" "dist/$WASM_NAME"
            echo "/$WASM_OLD_PATH /$WASM_NAME 200" >> dist/_redirects
            echo "Relocated $WASM_FILE → dist/$WASM_NAME"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name wedding-os
